<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labels de Teams Page</title>

    <link rel="stylesheet" href="../../../../shared/models/EMILIO-styles/styles.css">

</head>

<body>
    <h1><u>labels de Teams</u></h1>

    <div class="zonaRelPages">
        <button type="button" class="btnMovePages" onclick="window.location.href='/pages/admin/EMILIO/teams-members/teams.members.html';"> < Ver members de Teams</button>
        <button type="button" class="btnMovePages" onclick="window.location.href='/pages/admin/EMILIO/teams-cardsID/teams.cardsID.html';">Ver cards por ID de Teams ></button>

    </div>

    <!-- Contenedor de busqueda (visible inicialmente) -->
    <div id="search-container" style="display: flex; align-items: center; gap: 20px;">
        <h2>Por favor ingresa un teamId para visualizar los labels de un Team:</h2>
        <input type="number" id="team_label-teamId" placeholder="teamId">
        <button class="btnInPages" id="confirm-teamId-btn">Confirmar</button>

    </div>

    <!-- Formulario para crear/editar (oculto inicialmente) -->
    <div class="form-container" id="form-container" style="display: none;">
        <h2 id="form-title">Crear nuevo label de Team</h2>

        <form id="team_label-form">
            <input type="hidden" id="team_label-id" value="">
            <input type="text" id="team_label-name" placeholder="Nombre del label" required>
            <input type="text" id="team_label-color" placeholder="Color" required>
            <button class="btnChanges" type="submit" id="save-btn">Guardar</button>
            <button class="btnCancel" type="button" id="cancel-btn">Cancelar</button>
            <button class="btnMovePages" type="button" id="back-to-search-btn" style="margin-left: 10px;">Volver a buscar</button>

        </form>

    </div>

    <!-- Tabla de labels -->
    <div id="teams_labels-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Color</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="teams_labels-table-body">
                <!-- Las filas se cargaran dinamicamente -->

            </tbody>

        </table>

    </div>

    <script type="module" src="./teams-labels.js"></script>
</body>

</html>
